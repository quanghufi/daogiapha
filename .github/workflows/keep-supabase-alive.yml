name: Keep Supabase Alive

# Ping Supabase every 5 days to prevent auto-pause on free tier
# Supabase pauses projects with no activity for 7+ days

on:
  schedule:
    # Run every 5 days at 06:00 UTC (13:00 Vietnam time)
    - cron: '0 6 */5 * *'
  workflow_dispatch: # Allow manual trigger

env:
  SUPABASE_PROJECT_REF: nwdocopiysrnzmaijgyf

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Auth Health (no key needed)
        run: |
          echo "🏓 Pinging Supabase to keep project alive..."
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${SUPABASE_PROJECT_REF}.supabase.co/auth/v1/health")
          
          echo "Auth health endpoint: HTTP $RESPONSE"
          
          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Supabase Auth is healthy!"
          else
            echo "⚠️ Auth health check returned HTTP $RESPONSE"
          fi

      - name: Ping Supabase REST API
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "📡 Pinging Supabase REST API..."
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${SUPABASE_PROJECT_REF}.supabase.co/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          
          echo "REST API endpoint: HTTP $RESPONSE"

      - name: Ping Supabase PostgREST Health
        run: |
          echo "🔍 Checking PostgREST health..."
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${SUPABASE_PROJECT_REF}.supabase.co/rest/v1/")
          
          echo "PostgREST endpoint: HTTP $RESPONSE"
          echo ""
          echo "🎉 Keep-alive pings complete at $(date -u)"
          echo "Next run in ~5 days"
